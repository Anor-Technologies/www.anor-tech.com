{{ define "main" }}
  <div class="hx:mx-auto hx:flex hextra-max-page-width">

    <main
      id="content"
      class="hx:w-full hx:min-h-[calc(100vh-var(--hextra-navbar-height))] hx:flex hx:items-center hx:justify-center hx:px-6 hx:py-16"
    >

      <div class="hx:text-center hx:max-w-md hx:rounded-2xl hx:bg-white/70 hx:backdrop-blur-md hx:shadow-xl hx:p-10">

        <div class="hx:text-lg hx:mb-3">
          🚧 ERROR 404 - Page not found 🚧
        </div>
<br>
        <div class="hx:text-lg hx:font-semibold hx:tracking-wide hx:uppercase hx:text-gray-500 hx:mb-3">
          Oops… you found a void
        </div>
 <br>

        <h1 class="hx:text-2xl hx:font-bold hx:mb-2">
          
        </h1>

        <p class="hx:text-lg hx:text-gray-600 hx:mb-6">
          This page went on a ☕ break …  or never existed in the first place.
          <br />
        </p>

        <div class="hx:flex hx:flex-col hx:gap-3">

  <button
            onclick="window.location.href='{{ .Site.BaseURL }}'"
            class="hx:px-5 hx:py-2 hx:rounded-lg hx:border hx:border-gray-300 hx:text-sm hx:font-medium hx:hover:bg-gray-100 hx:transition"
          >
            Take me to ANOR Technologies homepage 🏠
          </button>

          <br>
          OR ....
          <br><br>
          <button
            onclick="history.back()"
            class="hx:px-5 hx:py-2 hx:rounded-lg hx:border hx:border-gray-300 hx:text-sm hx:font-medium hx:hover:bg-gray-100 hx:transition"
          >
            Go back to where I was before 🔙
          </button>

        </div>

        <div class="hx:text-xs hx:text-gray-400 hx:mt-6">
          Tip: Even we get lost sometimes 🚀
        </div>

      </div>

    </main>
  </div>
{{ end }}
