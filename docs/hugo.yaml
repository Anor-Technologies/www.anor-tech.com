# Configuration
baseURL: "/"
title: "ANOR Technologies Pte Ltd"

enableRobotsTXT: false
# Parse Git commit
enableGitInfo: false
# enableEmoji: false
hasCJKLanguage: true

# services:
#   googleAnalytics:
#     ID: G-MEASUREMENT_ID

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

defaultContentLanguage: en
languages:
  en:
    label: English
    weight: 1
    title: ANOR Technologies
  
  zh-cn:
    label: 中文
    locale: zh-CN
    weight: 4
    title: ANOR 科技
    params:
      banner:
        message: |
          Anor Technologies 的员工永远不会通过电话要求您转账或泄露银行登录信息。
      page:
        contextMenu:
          links:
            - name: 在 ChatGPT 中打开
              icon: chatgpt
              url: "https://chatgpt.com/?hints=search&q=%E6%88%91%E6%AD%A3%E5%9C%A8%E9%98%85%E8%AF%BB%E8%BF%99%E4%B8%AA%E6%96%87%E6%A1%A3%3A+{url}%0A%E5%B8%AE%E6%88%91%E7%90%86%E8%A7%A3%E5%A6%82%E4%BD%95%E4%BD%BF%E7%94%A8%E5%AE%83%E3%80%82"

module:
  hugoVersion:
    extended: true
    min: "0.146.0"

  workspace: hugo.work
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    # WHO WE ARE
    - identifier: who-we-are
      name: Who We Are
      weight: 1

    - identifier: about-anor-technologies
      name: About Anor Technologies
      pageRef: /who-we-are/about-anor-technologies
      parent: who-we-are
      weight: 1

    - identifier: our-mission-and-value
      name: Our Mission and Value
      pageRef: /who-we-are/our-mission-and-value
      parent: who-we-are
      weight: 2

    - identifier: our-people
      name: Our People
      pageRef: /who-we-are/our-people
      parent: who-we-are
      weight: 3

    - identifier: our-culture
      name: Our Culture
      pageRef: /who-we-are/our-culture
      parent: who-we-are
      weight: 4


    # WHAT WE DO
    - identifier: what-we-do
      name: What We Do
      weight: 2

    - identifier: cloud-security
      name: Cloud Security
      pageRef: /what-we-do/cloud-security
      parent: what-we-do
      weight: 1

    - identifier: cloud-infrastructure
      name: Cloud Infrastructure
      pageRef: /what-we-do/cloud-infrastructure
      parent: what-we-do
      weight: 2

    - identifier: ai-solutions
      name: AI Solutions
      pageRef: /what-we-do/ai-solutions
      parent: what-we-do
      weight: 3

    - identifier: cloudflare
      name: Cloudflare Solutions
      pageRef: /what-we-do/cloudflare
      parent: what-we-do
      weight: 4


    # PROJECTS
    - identifier: projects
      name: Our Projects
      weight: 3

    - identifier: digital-transformation
      name: Digital Transformation
      pageRef: /projects/digital-transformation
      parent: projects
      weight: 1

    - identifier: security-implementations
      name: Security Implementations
      pageRef: /projects/security-implementations
      parent: projects
      weight: 2


    - identifier: e-services
      name: E Services
      pageRef: /e-services
      weight: 4

    # INSIGHTS / BLOG
    - identifier: news-room
      name: News Room
      pageRef: /news-room
      weight: 5

    # JOIN US
    - identifier: join-us
      name: Join Us
      pageRef: /join-us
      weight: 6

    # CONTACT
    - identifier: contact
      name: Contact Us
      pageRef: /contact-us
      weight: 7
      
          # CONTACT
    - identifier: partner-program
      name: Partner Program
      pageRef: /partner-program
      weight: 8
      

params:
  description: SECURE . ACCELERATE . TRANSFORM

  externalLinkDecoration: true

  banner:
    key: 'announcement-v0.12'
    message: |
      Anor Technologies employees will never ask you to transfer money or disclose bank log-in details over a phone call.

  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo.png
      dark: images/logo-dark.png
      width: 102
      height: 130
      link: /
    width: wide

  theme:
    # light | dark | system
    default: light
    displayToggle: false

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: full

  # Display the last modification date
  displayUpdatedDate: false
  dateFormat: "2 January, 2006"

  # Display the author name of the last modified date
  displayUpdatedAuthor: false

  # Search
  # flexsearch is enabled by default
  search:
    enable: false
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra/edit/main/docs/content"

  blog:
    list:
      displayTags: false
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 20

    article:
      displayPagination: true

  archives:
    # Source section used for the archives page.
    section: blog
    # Date format for archive list items.
    dateFormat: "Jan 02"

  toc:
    displayTags: false

  highlight:
    copy:
      enable: fasle
      # hover | always
      display: hover

  page:
    # full (100%), wide (90rem), normal (80rem)
    width: wide
    # tabs:
    #   sync: true
    contextMenu:
      enable: false
      links:
        - name: Open in ChatGPT
          icon: chatgpt
          url: "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."
        - name: Open in Claude
          icon: claude
          url: "https://claude.ai/new?q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

  imageZoom:
    enable: true

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: 
      repoId: 
      category: 
      categoryId: 
      # mapping: pathname
      # strict: 0
      # reactionsEnabled: 1
      # emitMetadata: 0
      # inputPosition: top
      # lang: en
      # theme: noborder_dark
